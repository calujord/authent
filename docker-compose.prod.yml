# docker-compose.prod.yml — overrides de producción
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/config/staticfiles:ro
      - media_volume:/app/config/media:ro
      - /opt/ssl:/opt/ssl:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
