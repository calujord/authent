{% load i18n %}

<div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
    <label for="branch-selector" class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-2">
        {% trans "Sucursal Activa" %}
    </label>
    <select 
        id="branch-selector" 
        class="w-full px-3 py-2 text-sm bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 text-gray-900 dark:text-gray-100"
        onchange="window.location.href='/admin/set-active-branch/' + this.value + '/';"
    >
        <option value="">{% trans "Seleccionar sucursal..." %}</option>
        {% for membership in user_branches %}
            <option value="{{ membership.branch.id }}" {% if membership.branch.id == active_branch_id %}selected{% endif %}>
                {{ membership.branch.name }} - {{ membership.branch.business.name }}
            </option>
        {% endfor %}
    </select>
</div>
