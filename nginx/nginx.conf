upstream atharixhub_backend {
    server web:8000;
}

# ── Redirigir todo HTTP → HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    server_name authent.atharix.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS principal ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name authent.atharix.com;

    # ── Certificado wildcard *.atharix.com ────────────────────────────────────
    ssl_certificate     /opt/ssl/atharix.crt;
    ssl_certificate_key /opt/ssl/atharix.key;

    # ── Parámetros TLS modernos ───────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # ── HSTS ─────────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Headers de seguridad ──────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-Frame-Options          "DENY"          always;
    add_header Referrer-Policy          "same-origin"   always;

    client_max_body_size 20M;

    # ── API y admin de Django ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://atharixhub_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
    }

    # ── Archivos estáticos ────────────────────────────────────────────────────
    location /static/ {
        alias      /app/config/staticfiles/;
        expires    30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Archivos de media ─────────────────────────────────────────────────────
    location /media/ {
        alias      /app/config/media/;
        expires    7d;
        add_header Cache-Control "public, no-transform";
    }
}
